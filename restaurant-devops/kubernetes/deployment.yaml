# -------------------------------------------------------------
# Gateway & Web Frontend Deployments
# -------------------------------------------------------------

apiVersion: apps/v1
kind: Deployment
metadata:
  name: bistro-api-gateway
  labels:
    app: api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: bistro-api-gateway:latest
        ports:
        - containerPort: 8080
        env:
        - name: PORT
          value: "8080"
        - name: AUTH_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: bistro-config
              key: AUTH_SERVICE_URL
        - name: MENU_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: bistro-config
              key: MENU_SERVICE_URL
        - name: ORDER_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: bistro-config
              key: ORDER_SERVICE_URL
        - name: PAYMENT_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: bistro-config
              key: PAYMENT_SERVICE_URL
        - name: NOTIFICATION_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: bistro-config
              key: NOTIFICATION_SERVICE_URL
        - name: REPORT_SERVICE_URL
