version: '3.8'

services:
  # Relational Database
  postgres:
    image: postgres:15-alpine
    container_name: bistro-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: bistro_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Cache Layer
  redis:
    image: redis:7-alpine
    container_name: bistro-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Message Broker
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: bistro-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 1. API Gateway
  api-gateway:
    build: ./api-gateway
    container_name: bistro-api-gateway
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - AUTH_SERVICE_URL=http://auth-service:8081
      - MENU_SERVICE_URL=http://menu-service:8082
      - ORDER_SERVICE_URL=http://order-service:8083
      - PAYMENT_SERVICE_URL=http://payment-service:8084
      - NOTIFICATION_SERVICE_URL=http://notification-service:8085
      - REPORT_SERVICE_URL=http://report-service:8086
    depends_on:
      - auth-service
      - menu-service
      - order-service
      - payment-service
      - notification-service
      - report-service

  # 2. Authentication Service
  auth-service:
    build: ./auth-service
    container_name: bistro-auth-service
    ports:
      - "8081:8081"
    environment:
      - PORT=8081
      - DATABASE_URL=postgres://postgres:password@postgres:5432/bistro_db
      - JWT_SECRET=super_secret_restaurant_token_key
    depends_on:
      postgres:
        condition: service_healthy

  # 3. Menu Service
  menu-service:
    build: ./menu-service
    container_name: bistro-menu-service
    ports:
      - "8082:8082"
    environment:
      - PORT=8082
      - DATABASE_URL=postgres://postgres:password@postgres:5432/bistro_db
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # 4. Order Service
  order-service:
    build: ./order-service
    container_name: bistro-order-service
    ports:
      - "8083:8083"
    environment:
      - PORT=8083
      - DATABASE_URL=postgres://postgres:password@postgres:5432/bistro_db
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - PAYMENT_SERVICE_URL=http://payment-service:8084
      - NOTIFICATION_SERVICE_URL=http://notification-service:8085
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # 5. Payment Service
  payment-service:
    build: ./payment-service
    container_name: bistro-payment-service
    ports:
      - "8084:8084"
    environment:
      - PORT=8084
      - DATABASE_URL=postgres://postgres:password@postgres:5432/bistro_db
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - ORDER_SERVICE_URL=http://order-service:8083
      - NOTIFICATION_SERVICE_URL=http://notification-service:8085
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # 6. Notification Service
  notification-service:
    build: ./notification-service
    container_name: bistro-notification-service
    ports:
      - "8085:8085"
    environment:
      - PORT=8085
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
    depends_on:
      rabbitmq:
        condition: service_healthy

  # 7. Report Service
  report-service:
    build: ./report-service
    container_name: bistro-report-service
    ports:
      - "8086:8086"
    environment:
      - PORT=8086
      - DATABASE_URL=postgres://postgres:password@postgres:5432/bistro_db
      - ORDER_SERVICE_URL=http://order-service:8083
    depends_on:
      postgres:
        condition: service_healthy

  # 8. Web Frontend
  frontend:
    build: ./frontend
    container_name: bistro-frontend
    ports:
      - "3000:80"
    depends_on:
      - api-gateway

volumes:
  pgdata:
