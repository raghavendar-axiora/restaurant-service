name: Bistro Flux CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

env:
  DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME || 'bistrodev' }}
  DOCKER_HUB_PASSWORD: ${{ secrets.DOCKER_HUB_PASSWORD }}
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_REGION: us-east-1
  EKS_CLUSTER_NAME: bistro-eks-cluster

jobs:
  # 0. Check secrets availability
  check-secrets:
    runs-on: ubuntu-latest
    outputs:
      has_aws: ${{ steps.check_aws.outputs.has_aws }}
    steps:
      - name: Check AWS Secrets
        id: check_aws
        run: |
          if [ -n "${{ secrets.AWS_ACCESS_KEY_ID }}" ]; then
            echo "has_aws=true" >> $GITHUB_OUTPUT
          else
            echo "has_aws=false" >> $GITHUB_OUTPUT
          fi

  # 1. CI Pipeline: Test, Scan, Build and Publish Container Images
  ci-pipeline:
    runs-on: ubuntu-latest

  # 2. CD Pipeline: Deploy to AWS Kubernetes (EKS) Cluster
  cd-pipeline:
    needs: [ci-pipeline, check-secrets]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && env.AWS_ACCESS_KEY_ID != ''
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && needs.check-secrets.outputs.has_aws == 'true'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Setup AWS CLI & Kubeconfig
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Update Kubeconfig for EKS
        run: |
          aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

      # Deploy K8s resources using rolling updates
      - name: Deploy Manifests to Kubernetes Cluster
        run: |
          cd ./restaurant-devops/kubernetes
          kubectl apply -f configmap.yaml
          kubectl apply -f secret.yaml
          kubectl apply -f deployment.yaml
          kubectl apply -f service.yaml
          kubectl apply -f ingress.yaml

      # Force rolling update to pull the newly built images
      - name: Rollout Restart Deployments
        run: |
          kubectl rollout restart deployment/bistro-auth-service
          kubectl rollout restart deployment/bistro-menu-service
          kubectl rollout restart deployment/bistro-order-service
          kubectl rollout restart deployment/bistro-payment-service
          kubectl rollout restart deployment/bistro-notification-service
          kubectl rollout restart deployment/bistro-report-service
          kubectl rollout restart deployment/bistro-api-gateway
          kubectl rollout restart deployment/bistro-frontend

      # Verify Rollout Health (Smoke Test check)
      - name: Verify Deployments Health
        run: |
          kubectl rollout status deployment/bistro-api-gateway --timeout=90s
          kubectl rollout status deployment/bistro-frontend --timeout=90s
